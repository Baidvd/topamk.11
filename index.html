<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAVERICKS // PROTOCOL v7.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@100;400&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #000000;
            --card: rgba(12, 12, 12, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --text-dim: #666666;
            --nav-red: #ff3b30;
            --hum-blue: #4daafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::-webkit-scrollbar { width: 0px; }

        body {
            background-color: var(--bg); color: #ffffff; font-family: 'Inter', sans-serif;
            min-height: 100vh; overflow-x: hidden; position: relative;
            display: flex; flex-direction: column; align-items: center;
        }

        #canvas-bg { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
        .grid-layer { position: fixed; inset: 0; z-index: -2; opacity: 0.05; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 30px 30px; }

        #boot-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 1s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .boot-btn {
            background: transparent; border: 1px solid var(--accent); color: white;
            padding: 20px 60px; font-family: 'JetBrains Mono'; letter-spacing: 10px;
            text-transform: uppercase; transition: 0.5s; cursor: pointer; font-size: 14px;
        }
        .boot-btn:hover { background: white; color: black; box-shadow: 0 0 50px rgba(255,255,255,0.2); }

        .dashboard {
            display: grid; grid-template-columns: 1fr; gap: 20px;
            width: 95%; max-width: 1100px; z-index: 10; margin: 40px auto;
            opacity: 0; transform: scale(1.02); transition: 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @media (min-width: 1100px) { .dashboard { grid-template-columns: 340px 1fr; } }

        .card { background: var(--card); border: 1px solid var(--border); backdrop-filter: blur(20px); position: relative; transition: 0.3s; padding: 20px; }

        /* --- SIDEBAR --- */
        .sidebar { display: flex; flex-direction: column; height: fit-content; padding: 0; overflow: hidden; }
        .banner { width: 100%; height: 100px; background: #111; background-size: cover; background-position: center; }
        .pfp-wrap { margin: -40px 25px 15px 25px; position: relative; width: 85px; height: 85px; background: #000; border-radius: 50%; border: 1px solid var(--border); }
        #pfp { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #000; object-fit: cover; opacity: 0; transition: 0.5s; }
        .profile-content { padding: 0 25px 25px; }
        .display-name { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
        .username { font-family: 'JetBrains Mono'; font-size: 12px; color: var(--text-dim); }
        .badges-row { display: flex; gap: 8px; margin-top: 15px; padding: 5px 10px; background: rgba(0,0,0,0.3); border-radius: 8px; width: fit-content; opacity: 0; transition: 0.5s; }
        .badge-icon { width: 20px; height: 20px; }

        /* --- TIME & WEATHER (IMAGE REPLICA) --- */
        .time-weather-container { display: flex; flex-direction: column; gap: 20px; padding: 30px; }
        @media (min-width: 768px) { .time-weather-container { flex-direction: row; align-items: center; justify-content: space-between; } }
        
        .big-clock { font-family: 'Outfit', sans-serif; font-size: clamp(45px, 10vw, 65px); font-weight: 900; letter-spacing: 2px; line-height: 1; }
        .divider-v { width: 1px; height: 100px; background: rgba(255,255,255,0.08); display: none; }
        @media (min-width: 768px) { .divider-v { display: block; } }

        /* Weather Box Replica */
        .weather-box-replica { flex-grow: 1; max-width: 450px; display: flex; flex-direction: column; gap: 8px; }
        .w-loc { font-size: 12px; font-weight: 800; color: var(--text-dim); letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        .w-main { display: flex; align-items: center; gap: 25px; margin: 5px 0; }
        .w-temp-big { font-family: 'Outfit', sans-serif; font-size: clamp(55px, 12vw, 75px); font-weight: 900; line-height: 1; }
        .w-cond-group { display: flex; flex-direction: column; gap: 2px; }
        .w-cond-bold { font-size: 24px; font-weight: 800; color: #ffffff; }
        .w-cond-small { font-size: 13px; color: var(--text-dim); font-weight: 500; }
        .w-icon-side { margin-left: auto; color: #ffffff; opacity: 0.9; }

        .w-details-row { display: flex; gap: 25px; margin-top: 5px; font-size: 16px; color: #888; font-weight: 500; align-items: center; }
        .w-det-item { display: flex; align-items: center; gap: 10px; }

        /* --- HARDWARE & OTHERS --- */
        .hw-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
        @media (min-width: 600px) { .hw-grid { grid-template-columns: 1fr 1fr; } }
        .hw-val { font-size: 26px; font-weight: 700; margin-top: 8px; }
        .hw-bar { height: 2px; background: #111; margin-top: 15px; overflow: hidden; }
        .hw-fill { height: 100%; background: #fff; width: 0%; transition: 1.5s cubic-bezier(0.16, 1, 0.3, 1); }

        .icon-box { width: 55px; height: 55px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; color: #fff; transition: 0.3s; padding: 12px; }
        .icon-box svg { width: 100%; height: 100%; fill: currentColor; }
        .icon-box:hover { border-color: #fff; background: rgba(255,255,255,0.08); transform: translateY(-5px); }

        .activity-card { margin-top: 20px; border-left: 4px solid #fff; display: flex; flex-direction: column; gap: 15px; padding: 30px; }
        @media (min-width: 768px) { .activity-card { flex-direction: row; justify-content: space-between; align-items: center; } }
        .act-name { font-size: clamp(18px, 4vw, 22px); font-weight: 900; text-transform: uppercase; }
        .act-time { font-family: 'JetBrains Mono'; font-size: 35px; font-weight: 100; opacity: 0.1; }

    </style>
</head>
<body>

    <div class="grid-layer"></div>
    <canvas id="canvas-bg"></canvas>

    <!-- BOOT SCREEN -->
    <div id="boot-screen">
        <div class="boot-btn" onclick="initializeSystem()">Initialize Protocol</div>
    </div>

    <div class="dashboard" id="main-ui">
        <aside class="card sidebar">
            <div id="banner" class="banner"></div>
            <div class="pfp-wrap"><img id="pfp" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""></div>
            <div class="profile-content">
                <div id="display-name" class="display-name">...</div>
                <div id="username" class="username">@...</div>
                <div class="badges-row" id="badges">
                    <img src="https://raw.githubusercontent.com/mezotv/discord-badges/main/assets/discordnitro.svg" class="badge-icon">
                    <img src="https://raw.githubusercontent.com/mezotv/discord-badges/main/assets/discordboost9.svg" class="badge-icon">
                    <img src="https://raw.githubusercontent.com/mezotv/discord-badges/main/assets/hypesquadbravery.svg" class="badge-icon">
                </div>
                <div style="font-family:'JetBrains Mono'; font-size:9px; color:var(--text-dim); line-height:2.2; margin-top:20px; text-transform:uppercase;">
                    <div>> CODENAME: <b>GUN</b></div>
                    <div>> AGE: <b>16</b></div>
                    <div>> LOC: <b>CHIANG MAI, TH</b></div>
                </div>
            </div>
        </aside>

        <main>
            <div class="card time-weather-container">
                <div>
                    <div style="font-size:11px; font-weight:700; color:var(--text-dim); margin-bottom:12px;">LOCAL TIME</div>
                    <div id="clock" class="big-clock">00:00:00</div>
                    <div id="date-th" style="font-size:14px; color:var(--text-dim); margin-top:8px; font-weight: 500;">...</div>
                </div>
                
                <div class="divider-v"></div>

                <!-- WEATHER REPLICA SECTION -->
                <div class="weather-box-replica">
                    <div class="w-loc">
                        <i data-lucide="navigation" style="color: var(--nav-red); fill: var(--nav-red); width: 14px;"></i> CHIANG MAI, TH
                    </div>
                    <div class="w-main">
                        <div id="w-temp" class="w-temp-big">--°</div>
                        <div class="w-cond-group">
                            <div id="w-desc" class="w-cond-bold">Scanning...</div>
                            <div class="w-cond-small">Weather Data</div>
                        </div>
                        <div class="w-icon-side">
                            <i id="w-icon" data-lucide="sun" size="58" stroke-width="1.2"></i>
                        </div>
                    </div>
                    <div class="w-details-row">
                        <div class="w-det-item">
                            <i data-lucide="droplet" style="color: var(--hum-blue); fill: var(--hum-blue); width: 18px;"></i>
                            <span id="w-hum">--%</span>
                        </div>
                        <div class="w-det-item">
                            <i data-lucide="wind" style="width: 20px;"></i>
                            <span id="w-wind">-- km/h</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="hw-grid">
                <div class="card">
                    <div style="font-family:'JetBrains Mono'; font-size:9px; color:var(--text-dim); letter-spacing:2px;">CPU_ISO_LOAD</div>
                    <div id="cpu-val" class="hw-val">0.0%</div>
                    <div class="hw-bar"><div id="cpu-bar" class="hw-fill"></div></div>
                </div>
                <div class="card">
                    <div style="font-family:'JetBrains Mono'; font-size:9px; color:var(--text-dim); letter-spacing:2px;">MEMORY_RAM_USAGE</div>
                    <div id="ram-val" class="hw-val">0.0%</div>
                    <div class="hw-bar"><div id="ram-bar" class="hw-fill"></div></div>
                </div>
            </div>

            <div class="card" style="margin-top: 20px; display: flex; flex-direction: column; gap: 20px;">
                <div style="font-family:'JetBrains Mono'; font-size:14px; color:#888;">Initiate communication protocols:</div>
                <div style="display:flex; gap:15px;">
                    <a href="https://discord.com" target="_blank" class="icon-box"><svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0a12.64 12.64 0 0 0-.617-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028a14.09 14.09 0 0 0 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128a10.2 10.2 0 0 0 .372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127a12.299 12.299 0 0 1-1.873.892a.076.076 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028a19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.419 2.157-2.419c1.21 0 2.176 1.086 2.157 2.419c0 1.334-.966 2.419-2.156 2.419zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.419 2.157-2.419c1.21 0 2.176 1.086 2.157 2.419c0 1.334-.946 2.419-2.157 2.419z"/></svg></a>
                    <a href="https://github.com/Baidvd" target="_blank" class="icon-box"><svg viewBox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12c0 5.303 3.438 9.8 8.205 11.385c.6.113.82-.258.82-.577c0-.285-.01-1.04-.015-2.04c-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729c1.205.084 1.838 1.236 1.838 1.236c1.07 1.835 2.809 1.305 3.495.998c.108-.776.417-1.305.76-1.605c-2.665-.3-5.466-1.332-5.466-5.93c0-1.31.465-2.38 1.235-3.22c-.135-.303-.54-1.523.105-3.176c0 0 1.005-.322 3.3 1.23c.96-.267 1.98-.399 3-.405c1.02.006 2.04.138 3 .405c2.28-1.552 3.285-1.23 3.285-1.23c.645 1.653.24 2.873.12 3.176c.765.84 1.23 1.91 1.23 3.22c0 4.61-2.805 5.625-5.475 5.92c.43.372.82 1.102.82 2.222c0 1.606-.015 2.896-.015 3.286c0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg></a>
                    <a href="https://www.instagram.com/sittichok_bunsinchai" target="_blank" class="icon-box"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07c1.366.062 2.633.332 3.608 1.308c.975.975 1.245 2.242 1.308 3.607c.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.062 1.367-.332 2.633-1.308 3.608c-.975.975-2.242 1.245-3.607 1.308c-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.367-.062-2.633-.332-3.608-1.308c-.975-.975-1.245-2.242-1.308-3.607c-.058-1.266-.07-1.646-.07-4.85s.012-3.584.07-4.85c.062-1.367.332-2.633 1.308-3.608c.975-.975 2.242-1.245 3.607-1.308c1.266-.058 1.646-.07 4.85-.07M12 0C8.741 0 8.333.014 7.053.072C2.695.272.273 2.69.073 7.052C.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948c.2 4.355 2.618 6.778 6.98 6.978C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072c4.354-.2 6.782-2.618 6.979-6.98c.058-1.28.072-1.689.072-4.948c0-3.259-.014-3.667-.072-4.947c-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324a6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8a4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.88a1.44 1.44 0 0 0 0-2.88z"/></svg></a>
                </div>
            </div>

            <div class="card activity-card">
                <div>
                    <div style="font-family:'JetBrains Mono'; font-size:9px; color:var(--text-dim); margin-bottom:5px;">APP_MONITORING</div>
                    <div id="app-name" class="act-name">SYSTEM_IDLE</div>
                    <div id="app-detail" style="font-size: 12px; color: var(--text-dim);">Awaiting active process...</div>
                </div>
                <div id="app-time" class="act-time">00:00</div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        const DISCORD_ID = "1142835721388957707";
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < (window.innerWidth < 768 ? 20 : 40); i++) {
                particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.2, vy: (Math.random()-0.5)*0.2, size: Math.random()*1.5 });
            }
        }

        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = 'rgba(255,255,255,0.1)';
            particles.forEach(p => {
                p.x+=p.vx; p.y+=p.vy;
                if(p.x<0) p.x=canvas.width; if(p.x>canvas.width) p.x=0;
                if(p.y<0) p.y=canvas.height; if(p.y>canvas.height) p.y=0;
                ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        function initializeSystem() {
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = 'none';
                document.getElementById('main-ui').style.opacity = '1';
                document.getElementById('main-ui').style.transform = 'scale(1)';
            }, 800);
            setInterval(updateClock, 1000); 
            setInterval(updateHardware, 1000);
            setInterval(updateDiscord, 3000); 
            setInterval(fetchWeather, 600000);
            fetchWeather(); updateDiscord();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { timeZone: 'Asia/Bangkok', hour12: false });
            document.getElementById('date-th').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
        }

        async function updateHardware() {
            try {
                const ngrok_url = 'https://hemal-cinderella-stringlike.ngrok-free.dev/stats';
                const res = await fetch(ngrok_url, { headers: { "ngrok-skip-browser-warning": "true" } });
                const data = await res.json();
                document.getElementById('cpu-val').innerText = data.cpu.toFixed(1) + "%";
                document.getElementById('cpu-bar').style.width = data.cpu + "%";
                document.getElementById('ram-val').innerText = data.ram.toFixed(1) + "%";
                document.getElementById('ram-bar').style.width = data.ram + "%";
            } catch (e) {}
        }

        async function fetchWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=18.79&longitude=98.99&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m');
                const data = await res.json();
                document.getElementById('w-temp').innerText = Math.round(data.current.temperature_2m) + "°";
                document.getElementById('w-hum').innerText = Math.round(data.current.relative_humidity_2m) + "%";
                document.getElementById('w-wind').innerText = data.current.wind_speed_10m + " km/h";
                let code = data.current.weather_code;
                let desc = "Clear Sky"; let icon = "sun";
                if(code > 0) { desc = "Partly Cloudy"; icon = "cloud-sun"; }
                if(code >= 61) { desc = "Rainy"; icon = "cloud-rain"; }
                document.getElementById('w-desc').innerText = desc;
                document.getElementById('w-icon').setAttribute('data-lucide', icon);
                lucide.createIcons();
            } catch(e) {}
        }

        async function updateDiscord() {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const { data } = await res.json();
                const pfp = document.getElementById('pfp');
                pfp.src = `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${data.discord_user.avatar}.webp?size=512`;
                pfp.onload = () => pfp.style.opacity = "1";
                document.getElementById('display-name').innerText = data.discord_user.global_name || data.discord_user.username;
                document.getElementById('username').innerText = "@" + data.discord_user.username;
                document.getElementById('badges').style.opacity = "1";
                const banner = document.getElementById('banner');
                if (data.discord_user.banner) banner.style.backgroundImage = `url(https://cdn.discordapp.com/banners/${DISCORD_ID}/${data.discord_user.banner}.webp?size=1024)`;
                else banner.style.backgroundColor = data.discord_user.accent_color || '#111';
                const activity = data.activities.find(a => a.type === 0) || data.activities.find(a => a.type === 2);
                if (activity) {
                    document.getElementById('app-name').innerText = activity.name.toUpperCase();
                    document.getElementById('app-detail').innerText = activity.details || activity.state || "PROCESSING...";
                    if (activity.timestamps) {
                        const elapsed = Math.floor((Date.now() - activity.timestamps.start) / 1000);
                        document.getElementById('app-time').innerText = Math.floor(elapsed/60).toString().padStart(2,'0') + ":" + (elapsed%60).toString().padStart(2,'0');
                    }
                }
            } catch (e) {}
        }

        initCanvas(); animate(); window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>
